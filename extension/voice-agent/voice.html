<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nova Voice Agent — SuperNova TryOnMe</title>
  <link rel="stylesheet" href="voice.css" />
</head>
<body>
  <div class="va-container">
    <!-- Header -->
    <div class="va-header">
      <div class="va-logo">&#10024; Nova Voice Agent</div>
      <div class="va-status" id="statusBadge">Disconnected</div>
    </div>

    <!-- Visualizer -->
    <div class="va-visualizer" id="visualizer">
      <div class="va-orb" id="orb">
        <div class="va-orb-inner" id="orbInner"></div>
      </div>
      <div class="va-state-label" id="stateLabel">Press the microphone to start</div>
    </div>

    <!-- Transcript -->
    <div class="va-transcript" id="transcript">
      <div class="va-transcript-placeholder">Conversation will appear here...</div>
    </div>

    <!-- Tool activity -->
    <div class="va-tool-bar" id="toolBar" hidden>
      <span class="va-tool-icon">&#9881;</span>
      <span class="va-tool-text" id="toolText">Working...</span>
    </div>

    <!-- Controls -->
    <div class="va-controls">
      <select id="voiceSelect" class="va-voice-select">
        <option value="tiffany">Tiffany (US Female)</option>
        <option value="matthew">Matthew (US Male)</option>
        <option value="amy">Amy (UK Female)</option>
        <option value="arjun">Arjun (IN Male)</option>
        <option value="kiara">Kiara (IN Female)</option>
        <option value="lupe">Lupe (ES Female)</option>
        <option value="carlos">Carlos (ES Male)</option>
      </select>
      <button class="va-mic-btn" id="micBtn" title="Start voice session">
        <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
          <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
      </button>
      <button class="va-stop-btn" id="stopBtn" title="End session" hidden>
        <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
          <rect x="6" y="6" width="12" height="12" rx="2"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Socket.IO client (bundled) -->
  <script src="socket.io.min.js"></script>
  <script src="voice.js"></script>
</body>
</html>
